name:Build & Deploy Pokerixe Front

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    environment: pokerixe-front
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Login ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & Push image
        run: |
          docker build -t ghcr.io/baptouk/pokerixe-front:latest .
          docker push ghcr.io/baptouk/pokerixe-front:latest

      - name: Notifier le serveur
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}"  > private_key
          chmod 600 private_key
          ssh -i private_key -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} "
            docker pull ghcr.io/baptouk/pokerixe-front:latest &&
            cd ~/pokerixe/ &&
            docker compose up -d
          "
          rm private_key

