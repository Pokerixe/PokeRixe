<a routerLink="/pokemon/{{pokedex_id}}">
<div class="card">
  <div class="top">
      <img id="card" [src]="sprite" alt="{{ name }}">
  </div>

  <div class="bottom">

    <div class="desc-top">
    <p class="animation">{{name}}</p>
    <p class="animation">#{{pokedex_id}}</p>
    </div>
    <div class="desc-bottom">
      @for (type of types ;  track type) {
        <app-type type="{{type}}"></app-type>
      }
    </div>

  </div>

</div>
</a>
