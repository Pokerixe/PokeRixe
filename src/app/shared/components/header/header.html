<header class="header">
  <nav class="nav">
    <a routerLink=""><div class="nav-left" id="pokeFont">PokéRixe</div></a>


    @if (!auth.isAuthenticated()) {
      <ul class="nav-list">
        <li class="nav-item font-basic" routerLinkActive="active"><a routerLink="pokedex">Pokedex</a></li>
        <li class="nav-item font-basic" routerLinkActive="active"><a routerLink="equipes">Equipes</a></li>
        <li class="nav-item font-basic" routerLinkActive="active"><a routerLink="searchGame">Games</a></li>

      </ul>

      <div class="nav-user font-basic" routerLinkActive="active"><a routerLink="login">Se connecter</a></div>
      <div class="nav-user font-basic" routerLinkActive="active"><a routerLink="register">Inscription</a></div>

    } @else if (auth.isAuthenticated()) {
      <ul class="nav-list">
        <li class="nav-item font-basic" routerLinkActive="active"><a routerLink="pokedex">Pokedex</a></li>
        <li class="nav-item font-basic" routerLinkActive="active"><a routerLink="equipes">Equipes</a></li>
        <li class="nav-item font-basic" routerLinkActive="active"><a routerLink="fight">Fight</a></li>
        <li class="nav-item font-basic" routerLinkActive="active"><a routerLink="searchGame">Games</a></li>
      </ul>
      <div class="nav-user font-basic" routerLinkActive="active"><a routerLink="user">{{auth.currentUser()?.name}}</a></div>
    }

  </nav>
</header>
