<div class="fight-pokemon-card">
  <div class="card-top">
    <div class="img-wrap">
      <img [src]="img" [alt]="name">
    </div>
    <div class="pokemon-name">{{ name || 'Pokemon' }}</div>
  </div>

  <div class="hp-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="80">
    <div class="hp-fill" style="width: 80%;"></div>
  </div>
</div>
