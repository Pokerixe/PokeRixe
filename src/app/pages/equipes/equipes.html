<div class="team-container basic-container">
  <div class="left">
    <!-- Mode-specific panels -->
    <div *ngIf="selectedMode === Mode.CHOIX_POKEMON" class="mode-panel choix-pokemon">
      <h3>Choix Pokémon</h3>
      <p>Interface pour choisir les pokémons dans l'équipe.</p>
    </div>

    <div *ngIf="selectedMode === Mode.CHOIX_ATTACK" class="mode-panel choix-attack">
      <h3>Choix Attack</h3>
      <p>Interface pour choisir les attaques.</p>
    </div>

    <div *ngIf="selectedMode === Mode.AFFICHAGE_POKEMON" class="mode-panel affichage-pokemon">
      <h3>Affichage Pokémon</h3>
      <p>Affichage des détails du pokémon sélectionné.</p>
    </div>

    <div class="controls">
      <button type="button" (click)="cycleMode()">Changer le mode (gauche)</button>
    </div>
  </div>

  <div class="right">
    <div class="cards-grid" role="list">
      <div class="card-slot" role="listitem"><app-card></app-card></div>
      <div class="card-slot" role="listitem"><app-card></app-card></div>
      <div class="card-slot" role="listitem"><app-card></app-card></div>
      <div class="card-slot" role="listitem"><app-card></app-card></div>
      <div class="card-slot" role="listitem"><app-card></app-card></div>
      <div class="card-slot" role="listitem"><app-card></app-card></div>
    </div>

  </div>
</div>
